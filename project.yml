name: HarmonIQ
options:
  bundleIdPrefix: net.leochen.harmoniq
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  xcodeVersion: "15.0"
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.19
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_LANGUAGE: en
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 79DDZ6D8WT
    GENERATE_INFOPLIST_FILE: NO
targets:
  HarmonIQ:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: HarmonIQ
        excludes:
          - "Resources/Preview Content/**"
          - "Resources/Skins/**"
      - path: HarmonIQ/Resources/Preview Content
        buildPhase: resources
      - path: HarmonIQ/Resources/Skins
        type: folder
        buildPhase: resources
    resources:
      - HarmonIQ/Resources/Assets.xcassets
    dependencies:
      - package: ZIPFoundation
      - target: HarmonIQLiveActivity
    info:
      path: HarmonIQ/Info.plist
      properties:
        CFBundleDisplayName: HarmonIQ
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "5"
        UILaunchScreen:
          UIImageName: LaunchImage
          UIImageRespectsSafeAreaInsets: false
          UIColorName: LaunchBackground
        UIBackgroundModes:
          - audio
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        NSAppleMusicUsageDescription: "HarmonIQ uses your media library to play tracks."
        NSSupportsLiveActivities: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.leochen.harmoniq
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_ASSET_PATHS: "\"HarmonIQ/Resources/Preview Content\""
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
    postBuildScripts:
      - name: Embed build metadata
        # Writes GitCommit, GitTag, BuildTimestamp into the built app's
        # Info.plist so the Settings → About screen can show what's
        # actually running. Surfaced for issue #52.
        script: |
          set -euo pipefail
          INFO_PLIST="${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
          if [ ! -f "${INFO_PLIST}" ]; then
            echo "warning: Info.plist not found at ${INFO_PLIST}; skipping build metadata embed" >&2
            exit 0
          fi
          if git -C "${SRCROOT}" rev-parse --git-dir >/dev/null 2>&1; then
            GIT_COMMIT="$(git -C "${SRCROOT}" rev-parse --short HEAD 2>/dev/null || echo unknown)"
            GIT_TAG="$(git -C "${SRCROOT}" describe --tags --dirty --always 2>/dev/null || echo dev)"
          else
            GIT_COMMIT="unknown"
            GIT_TAG="dev"
          fi
          BUILD_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          PLIST_BUDDY=/usr/libexec/PlistBuddy
          for KEY in GitCommit GitTag BuildTimestamp; do
            "${PLIST_BUDDY}" -c "Delete :${KEY}" "${INFO_PLIST}" 2>/dev/null || true
          done
          "${PLIST_BUDDY}" -c "Add :GitCommit string ${GIT_COMMIT}" "${INFO_PLIST}"
          "${PLIST_BUDDY}" -c "Add :GitTag string ${GIT_TAG}" "${INFO_PLIST}"
          "${PLIST_BUDDY}" -c "Add :BuildTimestamp string ${BUILD_AT}" "${INFO_PLIST}"
        basedOnDependencyAnalysis: false
        runOnlyWhenInstalling: false

  HarmonIQLiveActivity:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.1"
    sources:
      - path: HarmonIQLiveActivity
      - path: HarmonIQ/LiveActivity/HarmonIQActivityAttributes.swift
    info:
      path: HarmonIQLiveActivity/Info.plist
      properties:
        CFBundleDisplayName: HarmonIQ Live Activity
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "5"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.leochen.harmoniq.LiveActivity
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
