name: HarmonIQ
options:
  bundleIdPrefix: net.leochen.harmoniq
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  xcodeVersion: "15.0"
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.19
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_LANGUAGE: en
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 79DDZ6D8WT
    GENERATE_INFOPLIST_FILE: NO
targets:
  HarmonIQ:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: HarmonIQ
        excludes:
          - "Resources/Preview Content/**"
          - "Resources/Skins/**"
      - path: HarmonIQ/Resources/Preview Content
        buildPhase: resources
      - path: HarmonIQ/Resources/Skins
        type: folder
        buildPhase: resources
    resources:
      - HarmonIQ/Resources/Assets.xcassets
    dependencies:
      - package: ZIPFoundation
    info:
      path: HarmonIQ/Info.plist
      properties:
        CFBundleDisplayName: HarmonIQ
        CFBundleShortVersionString: "0.3"
        CFBundleVersion: "2"
        UILaunchScreen:
          UIImageName: LaunchImage
          UIImageRespectsSafeAreaInsets: false
          UIColorName: LaunchBackground
        UIBackgroundModes:
          - audio
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        NSAppleMusicUsageDescription: "HarmonIQ uses your media library to play tracks."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.leochen.harmoniq
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_ASSET_PATHS: "\"HarmonIQ/Resources/Preview Content\""
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
